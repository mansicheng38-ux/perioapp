<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dental Chart Pro - Ultra Stable</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f8fafc; --divider: rgba(52, 152, 219, 0.7); }
        body { font-family: sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 0; }
        .header { background: white; padding: 20px; border-bottom: 4px solid var(--primary); }
        #log-box { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 10px; margin: 10px auto; max-width: 900px; font-family: monospace; font-weight: bold; }

        .chart-wrapper { 
            position: relative; max-width: 1100px; margin: 20px auto; 
            background: white; padding: 60px 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 70px;
        }
        .v-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--divider); transform: translateX(-50%); z-index: 1; }
        .h-line { position: absolute; left: 0; right: 0; top: 50%; height: 4px; background: var(--divider); transform: translateY(-50%); z-index: 1; }

        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 10px; position: relative; z-index: 2; }
        .tooth { border: 2px solid #cbd5e1; height: 65px; display: flex; align-items: center; justify-content: center; font-weight: bold; background: white; font-size: 16px; border-radius: 4px; }
        
        /* 缺失標記 (紅色大叉叉) */
        .missing { background: #fee2e2 !important; }
        .missing::after {
            content: "X"; color: #e74c3c; font-size: 55px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 100;
        }

        .controls { position: fixed; bottom: 0; width: 100%; background: white; padding: 30px; border-top: 1px solid #eee; z-index: 1000; }
        #start-btn { padding: 20px 100px; font-size: 24px; border-radius: 60px; border: none; background: var(--success); color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">CLINICAL CHARTING (LOCAL)</h1>
    <div id="log-box">HEARD: (Waiting for Start...)</div>
</div>

<div class="chart-wrapper">
    <div class="v-line"></div><div class="h-line"></div>
    <div class="row" id="upper"></div> <div class="row" id="lower"></div> </div>

<div class="controls">
    <button id="start-btn" onclick="toggleSession()">START SESSION</button>
</div>

<script>
    // 嚴格成人牙位 FDI
    const uIds = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
    
    const draw = (arr, t) => arr.forEach(id => document.getElementById(t).innerHTML += `<div class="tooth" id="t-${id}">${id}</div>`);
    draw(uIds, 'upper'); draw(lIds, 'lower');

    function processLocal(text) {
        let t = text.toLowerCase().trim();
        document.getElementById('log-box').innerText = "HEARD: " + t;

        // 數字語音暴力映射
        const mapping = {
            "one one": "11", "eleven": "11", "one one": "11", "1 1": "11",
            "one four": "14", "one eight": "18", "four eight": "48"
        };
        for (let key in mapping) { t = t.replace(new RegExp(key, 'g'), mapping[key]); }

        // 捕捉 FDI 編號
        const toothMatch = t.match(/\b(1[1-8]|2[1-8]|3[1-8]|4[1-8])\b/g);
        if (!toothMatch) return;

        toothMatch.forEach(id => {
            const el = document.getElementById('t-' + id);
            if (!el) return;

            // 判斷是否為缺失 (含容錯)
            if (t.includes("missing") || t.includes("nissan") || t.includes("won't fall") || t.includes("listen") || t.includes("mising")) {
                el.classList.add('missing');
                speak("Recorded " + id);
            }
        });
    }

    function speak(msg) {
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
    }

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;

    rec.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript;
        processLocal(result);
    };

    let isRecording = false;
    function toggleSession() {
        const btn = document.getElementById('start-btn');
        if (!isRecording) {
            rec.start();
            isRecording = true;
            btn.innerText = "STOP SESSION";
            btn.style.background = "#e74c3c";
            speak("System online. Say tooth number.");
        } else {
            rec.stop();
            isRecording = false;
            btn.innerText = "START SESSION";
            btn.style.background = "#27ae60";
        }
    }
</script>
</body>
</html>
