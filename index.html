<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Dental Charting AI</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #16a34a; --danger: #dc2626; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        
        .header-panel { background: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 10px; z-index: 1000; }
        .patient-box input { font-size: 16px; padding: 8px; border: 2px solid #cbd5e1; border-radius: 6px; font-weight: bold; width: 200px; }
        .mode-btn { padding: 10px 25px; font-weight: bold; cursor: pointer; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; margin: 0 5px; }
        .mode-btn.active { background: var(--primary); color: white; }

        #log-box { background: #1e293b; color: #38bdf8; padding: 12px; margin: 10px 0; border-radius: 8px; font-family: monospace; font-size: 16px; font-weight: bold; }

        .chart-section { background: white; padding: 30px 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .row-container { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .legend-label { font-weight: bold; color: #64748b; font-size: 12px; width: 30px; text-align: right; display: flex; flex-direction: column; justify-content: space-between; height: 50px; }
        .grid-row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; flex-grow: 1; position: relative; }
        .v-divider { position: absolute; left: 50%; top: -10px; bottom: -10px; width: 4px; background: rgba(37, 99, 235, 0.3); transform: translateX(-50%); }

        .tooth-unit { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-id { font-weight: bold; font-size: 14px; margin-bottom: 4px; cursor: pointer; padding: 2px 5px; border-radius: 3px; }
        .tooth-id:hover { background: #e2e8f0; }
        
        .odontogram { width: 50px; height: 50px; background: white; border: 1px solid #cbd5e1; position: relative; cursor: pointer; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; transition: 0.1s; }
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        
        .bridge-line { position: absolute; top: 23px; width: 100%; height: 6px; background: #3b82f6; display: none; z-index: 5; pointer-events: none; }
        .missing-mark { display: none; position: absolute; top: 0; left: 0; width: 50px; height: 50px; pointer-events: none; z-index: 10; }
        .t-missing .missing-mark { display: block; }
        .t-missing .odontogram { opacity: 0.2; }

        .perio-ui { display: none; background: white; padding: 20px; border-radius: 12px; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        th, td { border: 1px solid #cbd5e1; padding: 5px; text-align: center; }
        .active-cell { background: #fef08a !important; font-weight: bold; color: #b45309; }
        input.p-in { width: 35px; text-align: center; border: 1px solid #ddd; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 80px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; width: fit-content; margin: 10px auto; }
        .bpe-grid div { background: white; padding: 10px 20px; font-weight: bold; font-size: 20px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
        #mic-btn { padding: 15px 60px; border-radius: 50px; border: none; background: var(--success); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .recording { background: var(--danger) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header-panel">
    <div class="patient-box"><b>Patient:</b> <input type="text" placeholder="ID..."></div>
    <div>
        <button class="mode-btn" id="btn-gen" onclick="setMode('general', true)">General</button>
        <button class="mode-btn" id="btn-perio" onclick="setMode('perio', true)">Periodontal</button>
    </div>
</div>

<div id="log-box">SYSTEM STANDBY. Press Start Session.</div>

<div class="chart-section" id="general-ui">

        <div class="legend-label"><span>B</span><span>L</span></div>
        <div class="grid-row" id="u-row"><div class="v-divider"></div></div>
    </div>
    <div class="row-container">
        <div class="legend-label"><span>B</span><span>L</span></div>
        <div class="grid-row" id="l-row
