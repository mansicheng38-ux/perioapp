<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Voice Dental Chart</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --success: #16a34a; --danger: #dc2626; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        .header { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000; }
        #log-box { background: #1e293b; color: #38bdf8; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 16px; margin-top: 10px; }
        
        /* Grid Layouts */
        .chart-section { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; margin-bottom: 20px; align-items: end; }
        
        /* Odontogram (General) */
        .tooth-card { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-id { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .odontogram { width: 50px; height: 50px; background: white; border: 1px solid #cbd5e1; border-radius: 4px; position: relative; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; }
        
        /* Restorations & Status */
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        .missing::after { content: "X"; color: #ef4444; font-size: 50px; position: absolute; top: 0; left: 0; font-weight: 100; pointer-events: none; }
        .bridge-line { position: absolute; top: 25px; height: 4px; background: #3b82f6; width: 100%; z-index: 5; display: none; }
        
        /* Perio Table */
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        th { background: #f1f5f9; }
        .active-tooth { background: #fef08a !important; } /* Highlights tooth being probed */
        
        /* BPE & Dashboard */
        .dashboard { display: flex; justify-content: space-around; background: #e0f2fe; padding: 15px; border-radius: 8px; margin-bottom: 80px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; }
        .bpe-grid div { background: white; padding: 15px 20px; font-weight: bold; font-size: 20px; }

        /* Controls */
        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; }
        button { padding: 15px 40px; font-size: 18px; border-radius: 50px; border: none; background: var(--success); color: white; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="mode-title" style="margin:0;">SYSTEM STANDBY</h1>
    <div id="log-box">HEARD: Click Start Session to begin</div>
</div>

<div class="chart-section" id="general-chart">
    <h3>General Charting</h3>
    <div class="row" id="upper-grid"></div>
    <div class="row" id="lower-grid"></div>
</div>

<div class="chart-section" id="perio-chart">
    <h3>Periodontal Charting</h3>
    <table id="perio-table-upper"></table>
    <table id="perio-table-lower"></table>
</div>

<div class="dashboard">
    <div>
        <h3>BPE Score</h3>
        <div class="bpe-grid">
            <div id="bpe-s1">-</div><div id="bpe-s2">-</div><div id="bpe-s3">-</div>
            <div id="bpe-s6">-</div><div id="bpe-s5">-</div><div id="bpe-s4">-</div>
        </div>
    </div>
    <div>
        <h3>Bleeding on Probing</h3>
        <div style="font-size: 32px; font-weight: bold; color: #dc2626;" id="bop-percent">0%</div>
    </div>
</div>

<div class="controls">
    <button id="start-btn" onclick="toggleMic()">START SESSION</button>
</div>
