<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Perio Pro - English Auto-Pilot</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; text-align: center; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-width: 900px; margin: 0 auto 20px; }
        .tooth { background: white; border: 1px solid #ddd; padding: 15px 5px; border-radius: 8px; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; }
        .tooth.missing { background: #455a64 !important; color: white; }
        .tooth.missing::after { content: '✕'; position: absolute; font-size: 35px; color: rgba(255,0,0,0.5); }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 25px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); }
        #start-btn { padding: 18px 60px; font-size: 20px; border-radius: 40px; border: none; background: var(--success); color: white; cursor: pointer; font-weight: bold; }
        #live-box { background: #e8f4fd; padding: 10px; border-radius: 8px; color: #2980b9; margin-top: 10px; font-weight: bold; min-height: 24px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; font-size: 18px;">MODE: GENERAL CHARTING (MISSING)</div>
    <div id="live-box">Click Start and say tooth numbers...</div>
</div>

<div class="grid" id="upper-grid"></div>
<div class="grid" id="lower-grid"></div>

<div class="controls">
    <button id="start-btn">Start Session</button>
</div>

<script>
    const uIds = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28];
    const lIds = [48,47,46,45,44,43,42,41, 31,32,33,34,35,36,37,38];
    const teethData = {};
    let silenceTimer;
    let accumulatedText = "";

    // 1. Initialize UI Immediately
    window.onload = () => {
        const draw = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                teethData[id] = { missing: false };
                const div = document.createElement('div');
                div.className = 'tooth'; div.id = `t-${id}`; div.innerText = id;
                el.appendChild(div);
            });
        };
        draw(uIds, 'upper-grid'); draw(lIds, 'lower-grid');
    };

    // 2. Clear Voice Feedback
    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    // 3. Speech Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) accumulatedText += event.results[i][0].transcript + " ";
            else interim += event.results[i][0].transcript;
        }

        const currentText = (accumulatedText + interim);
        document.getElementById('live-box').innerText = "Hearing: " + currentText;

        // --- THE 2-SECOND SILENCE TRIGGER ---
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (currentText.trim()) {
                processVoiceData(currentText);
                accumulatedText = ""; // Clear for next round
            }
        }, 2000); 
    };

    // 4. Logic: Process Missing Teeth
    function processVoiceData(text) {
        const lowerText = text.toLowerCase();
        // Catch all numbers in the sentence
        const nums = lowerText.match(/\d+/g);
        
        // Keywords for missing
        const isMissing = lowerText.includes("miss") || lowerText.includes("none") || lowerText.includes("absent");

        if (isMissing && nums) {
            let marked = [];
            nums.forEach(n => {
                if (teethData[n]) {
                    teethData[n].missing = true;
                    document.getElementById(`t-${n}`).classList.add('missing');
                    marked.push(n);
                }
            });
            if(marked.length > 0) {
                speak(`Recorded ${marked.join(", ")} missing.`);
            }
        }
    }

    // 5. Start Button with Safety Check
    document.getElementById('start-btn').onclick = async () => {
        if (window.location.protocol === 'file:') {
            alert("❌ Browser block: Cannot use voice on a local file.\nPlease use your GitHub Pages URL (https://...).");
            return;
        }
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            rec.start();
            document.getElementById('start-btn').innerText = "SYSTEM ACTIVE";
            document.getElementById('start-btn').style.background = "#e74c3c";
            speak("Assistant online. Say tooth numbers and the word missing.");
        } catch (e) {
            alert("Mic Error: " + e.message);
        }
    };
</script>
</body>
</html>
