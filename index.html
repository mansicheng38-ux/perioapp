<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Perio Pro - Odontogram</title>
    <style>
        :root { --bg: #f8fafc; --tooth-border: #cbd5e1; }
        body { font-family: sans-serif; background: var(--bg); text-align: center; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; max-width: 1000px; margin: 20px auto 100px; }
        
        /* 牙齒方塊容器 */
        .tooth-container { display: flex; flex-direction: column; align-items: center; }
        .tooth-label { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #475569; }
        
        /* SVG 牙位圖樣式 */
        .odontogram { width: 60px; height: 60px; background: white; border: 1px solid var(--tooth-border); border-radius: 4px; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; cursor: pointer; transition: 0.2s; }
        
        /* 顏色定義 */
        .c-composite { fill: #3498db !important; } /* 樹脂：藍色 */
        .c-gi { fill: #9b59b6 !important; }        /* GI：紫色 */
        .c-caries { fill: #e74c3c !important; }    /* 蛀牙：紅色 */
        .c-abr { fill: #f1c40f !important; }       /* 磨耗：黃色 */
        
        /* 特殊狀態：整顆標記 */
        .t-missing { opacity: 0.3; background: #e2e8f0; }
        .t-implant { border: 3px solid #34495e; border-radius: 50%; } /* 植牙：深色圓框 */
        .t-zirconia { background: #ecf0f1; outline: 3px solid #95a5a6; } /* 鋯冠：灰色外框 */
        .t-cmc { background: #dcdde1; outline: 3px solid #7f8c8d; }     /* CMC：金屬感外框 */

        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        #start-btn { padding: 15px 40px; font-size: 18px; border-radius: 30px; border: none; background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
        #live-box { color: #8e44ad; font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2>DENTAL ODONTOGRAM (VOICE)</h2>
    <div id="live-box">Waiting for command...</div>
</div>

<div class="grid" id="upper-grid"></div>
<div class="grid" id="lower-grid"></div>

<div class="controls">
    <button id="start-btn">Start Session</button>
</div>

<script>
    const uIds = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28];
    const lIds = [48,47,46,45,44,43,42,41, 31,32,33,34,35,36,37,38];
    const teethData = {};

    window.onload = () => {
        const draw = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                teethData[id] = { status: 'normal', surfaces: {} };
                el.innerHTML += `
                <div class="tooth-container" id="container-${id}">
                    <div class="tooth-label">${id}</div>
                    <svg class="odontogram" id="svg-${id}" viewBox="0 0 100 100">
                        <path id="${id}-B" class="surface" d="M0 0 L100 0 L75 25 L25 25 Z" />
                        <path id="${id}-L" class="surface" d="M0 100 L100 100 L75 75 L25 75 Z" />
                        <path id="${id}-M" class="surface" d="M0 0 L25 25 L25 75 L0 100 Z" />
                        <path id="${id}-D" class="surface" d="M100 0 L75 25 L75 75 L100 100 Z" />
                        <rect id="${id}-O" class="surface" x="25" y="25" width="50" height="50" />
                    </svg>
                </div>`;
            });
        };
        draw(uIds, 'upper-grid'); draw(lIds, 'lower-grid');
    };

    function updateToothUI(id) {
        const container = document.getElementById(`container-${id}`);
        const data = teethData[id];

        // 移除所有舊樣式
        container.className = "tooth-container";
        if (data.status === 'missing') container.classList.add('t-missing');
        if (data.status === 'implant') container.classList.add('t-implant');
        if (data.status === 'zirconia_crown') container.classList.add('t-zirconia');
        if (data.status === 'cmc_crown') container.classList.add('t-cmc');

        // 更新表面顏色
        for (const [surf, condition] of Object.entries(data.surfaces)) {
            const path = document.getElementById(`${id}-${surf}`);
            if (path) {
                path.classList.remove('c-composite', 'c-gi', 'c-caries', 'c-abr');
                if (condition === 'composite') path.classList.add('c-composite');
                if (condition === 'gi') path.classList.add('c-gi');
                if (condition === 'caries') path.classList.add('c-caries');
                if (condition === 'abrasion') path.classList.add('c-abr');
            }
        }
    }

    // 語音核心 (與之前相同，僅處理邏輯改變)
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true; rec.interimResults = true;

    rec.onresult = async (event) => {
        let text = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) text = event.results[i][0].transcript;
        }

        if (text) {
            document.getElementById('live-box').innerText = "Analyzing: " + text;
            try {
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const aiData = await response.json();
                
                for (const [id, info] of Object.entries(aiData)) {
                    if (teethData[id]) {
                        if (info.status) teethData[id].status = info.status;
                        if (info.surfaces) {
                            Object.assign(teethData[id].surfaces, info.surfaces);
                        }
                        updateToothUI(id);
                    }
                }
            } catch (e) { console.error(e); }
        }
    };

    document.getElementById('start-btn').onclick = () => {
        rec.start();
        document.getElementById('start-btn').innerText = "LISTENING...";
    };
</script>
</body>
</html>
