<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Dental Chart</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f8fafc; margin: 0; }
        #err { background: #ff4d4f; color: white; padding: 10px; display: none; }
        #heard { background: #e6f7ff; padding: 10px; font-weight: bold; border-bottom: 2px solid #1890ff; }
        .wrapper { position: relative; max-width: 1000px; margin: 20px auto; background: white; padding: 40px; }
        .v-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #3498db; opacity: 0.3; }
        .h-line { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: #3498db; opacity: 0.3; }
        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; position: relative; z-index: 2; margin-bottom: 60px; }
        .tooth { border: 1px solid #ddd; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .missing { background: #fee2e2; position: relative; }
        .missing::after { content: "X"; color: red; font-size: 30px; position: absolute; }
        .btn { padding: 15px 60px; font-size: 20px; background: #22c55e; color: white; border: none; border-radius: 50px; cursor: pointer; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div id="err"></div>
    <div id="heard">Heard: (Wait...)</div>
    <div class="wrapper">
        <div class="v-line"></div><div class="h-line"></div>
        <div class="row" id="u"></div> <div class="row" id="l"></div> </div>
    <button class="btn" onclick="start()">START SESSION</button>

    <script>
        const uIds = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28"];
        const lIds = ["48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
        const draw = (arr, t) => arr.forEach(id => document.getElementById(t).innerHTML += `<div class="tooth" id="t-${id}">${id}</div>`);
        draw(uIds, 'u'); draw(lIds, 'l');

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'en-US'; rec.continuous = true;

        rec.onresult = async (event) => {
            const text = event.results[event.results.length - 1][0].transcript;
            document.getElementById('heard').innerText = "Heard: " + text;
            const res = await fetch('/api/gemini', { method: 'POST', body: JSON.stringify({ text }), headers: {'Content-Type': 'application/json'} });
            const data = await res.json();
            if (data.fatalError) {
                document.getElementById('err').innerText = data.fatalError;
                document.getElementById('err').style.display = "block";
            } else if (Array.isArray(data)) {
                data.forEach(item => {
                    const el = document.getElementById('t-' + item.id);
                    if (el && item.status === 'missing') el.classList.add('missing');
                });
            }
        };
        function start() { rec.start(); }
    </script>
</body>
</html>
