<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Dental Pro - Dual Control Fix</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #16a34a; --danger: #dc2626; --divider: rgba(37, 99, 235, 0.4); }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        
        /* 頂部控制面板 */
        .header-panel { background: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 10px; z-index: 1000; }
        #status-bar { background: #1e293b; color: #38bdf8; padding: 12px; margin: 10px 0; border-radius: 8px; font-family: monospace; font-size: 16px; min-height: 24px; }
        .mode-btn { padding: 10px 25px; font-weight: bold; cursor: pointer; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; margin: 0 5px; }
        .mode-btn.active { background: var(--primary); color: white; }

        /* 圖表區域 */
        .chart-section { background: white; padding: 30px 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .legend-label { font-weight: bold; color: #64748b; font-size: 12px; width: 30px; text-align: right; }
        .row-container { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .grid-row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; flex-grow: 1; position: relative; }
        .v-divider { position: absolute; left: 50%; top: -10px; bottom: -10px; width: 4px; background: var(--divider); transform: translateX(-50%); }

        /* 牙齒視覺 */
        .tooth-unit { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-id { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .odontogram { width: 50px; height: 50px; background: white; border: 1px solid #cbd5e1; position: relative; cursor: pointer; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; }
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        .missing-mark { display: none; position: absolute; top: 0; left: 0; width: 50px; height: 50px; pointer-events: none; }
        .t-missing .missing-mark { display: block; }
        .t-missing .odontogram { opacity: 0.2; }

        /* Perio 表格 */
        .perio-ui { display: none; background: white; padding: 20px; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        .active-cell { background: #fef08a !important; }

        /* 儀表板 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 80px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; width: fit-content; margin: 10px auto; }
        .bpe-grid div { background: white; padding: 10px 20px; font-weight: bold; font-size: 20px; }

        /* 底部按鈕 */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-top: 1px solid #ddd; z-index: 1000; }
        #mic-btn { padding: 15px 60px; border-radius: 50px; border: none; background: var(--success); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .recording { background: var(--danger) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header-panel">
    <div><b>Patient ID:</b> <input type="text" id="patient-id" placeholder="Enter ID..."></div>
    <div>
        <button class="mode-btn" id="btn-gen" onclick="setMode('general')">General</button>
        <button class="mode-btn" id="btn-perio" onclick="setMode('perio')">Periodontal</button>
    </div>
</div>

<div id="status-bar">HEARD: (Waiting for Session...)</div>

<div class="chart-section" id="general-ui">
    <div class="row-container">
        <div class="legend-label">B<br><br>L</div>
        <div class="grid-row" id="u-row"><div class="v-divider"></div></div>
    </div>
    <div class="row-container">
        <div class="legend-label">B<br><br>L</div>
        <div class="grid-row" id="l-row"><div class="v-divider"></div></div>
    </div>
</div>

<div class="perio-ui" id="perio-ui">
    <table id="table-upper"></table>
    <table id="table-lower"></table>
</div>

<div class="dashboard">
    <div style="background:white; border-radius:12px; padding:15px;">
        <h3>BPE Score</h3>
        <div class="bpe-grid">
            <div id="b1">-</div><div id="b2">-</div><div id="b3">-</div>
            <div id="b6">-</div><div id="b5">-</div><div id="b4">-</div>
        </div>
    </div>
    <div style="background:white; border-radius:12px; padding:15px;">
        <h3>BOP %</h3>
        <div id="bop-stat" style="font-size: 40px; font-weight: bold; color: var(--danger);">0%</div>
    </div>
</div>

<div class="footer">
    <button id="mic-btn" onclick="toggleMic()">START SESSION</button>
</div>

<script>
    /* --- DATA & CONFIG --- */
    const uIds = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
    const allIds = [...uIds, ...lIds];
    const dentalData = {};
    let voiceLog = [];
    let appState = "idle"; // idle, init, general, perio

    allIds.forEach(id => {
        dentalData[id] = { missing: false, surfaces: {}, pd: {b:[], p:[]}, bop: {b:[], p:[]}, rec: "", mob: "" };
    });

    /* --- INITIALIZE UI --- */
    window.onload = () => {
        const render = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                let isLeft = ["1","4"].includes(id[0]);
                el.innerHTML += `
                <div class="tooth-unit" id="unit-${id}">
                    <div class="tooth-id">${id}</div>
                    <div style="position:relative; width:50px; height:50px;" onclick="manualMissing('${id}')">
                        <svg class="odontogram" viewBox="0 0 100 100">
                            <path id="${id}-B" class="surface" d="M0 0 L100 0 L80 20 L20 20 Z" onclick="manualSurface(event,'${id}','B')"/>
                            <path id="${id}-L" class="surface" d="M0 100 L100 100 L80 80 L20 80 Z" onclick="manualSurface(event,'${id}','L')"/>
                            <path id="${id}-M" class="surface" d="${isLeft ? 'M100 0 L80 20 L80 80 L100 100 Z' : 'M0 0 L20 20 L20 80 L0 100 Z'}" onclick="manualSurface(event,'${id}','M')"/>
                            <path id="${id}-D" class="surface" d="${isLeft ? 'M0 0 L20 20 L20 80 L0 100 Z' : 'M100 0 L80 20 L80 80 L100 100 Z'}" onclick="manualSurface(event,'${id}','D')"/>
                            <rect id="${id}-O" class="surface" x="20" y="20" width="60" height="60" onclick="manualSurface(event,'${id}','O')"/>
                        </svg>
                        <svg class="missing-mark" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" stroke="red" stroke-width="10"/><line x1="100" y1="0" x2="0" y2="100" stroke="red" stroke-width="10"/></svg>
                    </div>
                </div>`;
            });
        };
        render(uIds, 'u-row'); render(lIds, 'l-row');
        renderPerioTable();
    };

    function renderPerioTable() {
        const build = (ids) => {
            let h = `<tr><th>ID</th>` + ids.map(id => `<th>${id}</th>`).join('') + `</tr>`;
            h += `<tr><td>PDB</td>` + ids.map(id => `<td id="pdb-${id}"></td>`).join('') + `</tr>`;
            h += `<tr><td>PDP</td>` + ids.map(id => `<td id="pdp-${id}"></td>`).join('') + `</tr>`;
            return h;
        };
        document.getElementById('table-upper').innerHTML = build(uIds);
        document.getElementById('table-lower').innerHTML = build(lIds);
    }

    /* --- SPEECH ENGINE --- */
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;

    function speak(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

    function toggleMic() {
        if(appState === "idle") {
            rec.start(); appState = "init";
            document.getElementById('mic-btn').classList.add('recording');
            speak("System started. General or Periodontal?");
        } else { location.reload(); }
    }

    rec.onresult = (e) => {
        let raw = e.results[e.results.length - 1][0].transcript;
        voiceLog.push(raw);
        let t = raw.toLowerCase().trim();

        // 關鍵糾錯映射
        t = t.replace(/buckle/g, "buccal");
        t = t.replace(/(\d{2})\s+two\s+(\d{2})/g, "$1 to $2"); // 修正 31 two 35 -> 31 to 35
        t = t.replace(/one\s+one/g, "11").replace(/one\s+two/g, "12").replace(/one\s+three/g, "13").replace(/one\s+four/g, "14").replace(/one\s+five/g, "15");
        t = t.replace(/\b(\d)\s+(\d)\b/g, "$1$2"); // "3 1" -> "31"

        document.getElementById('status-bar').innerText = "HEARD: " + t;

        if (t.includes("play back recording")) { speak("Recording: " + voiceLog.join(". ")); return; }

        if (appState === "init") {
            if (t.includes("general")) setMode('general', true);
            else if (t.includes("perio")) setMode('perio', true);
        } else if (appState === "general") {
            processGeneral(t);
        }
        // ... Perio 邏輯與之前保持一致
    };

    /* --- LOGIC HANDLERS --- */
    function processGeneral(t) {
        // 範圍處理: "31 to 35 missing"
        const range = t.match(/(\d{2})\s*to\s*(\d{2})\s*(missing|bridge)/);
        if (range) {
            let s = parseInt(range[1]), e = parseInt(range[2]);
            let min = Math.min(s, e), max = Math.max(s, e);
            allIds.forEach(id => {
                if (parseInt(id) >= min && parseInt(id) <= max) {
                    if (range[3] === "missing") updateStatus(id, 'missing', true);
                    if (range[3] === "bridge") updateStatus(id, 'bridge', true);
                }
            });
            speak(`${range[3]} from ${s} to ${e}`);
            return;
        }

        // 個別牙齒處理: "31 buccal composite"
        const ids = t.match(/\b([1-4][1-8])\b/g);
        if (!ids) return;

        ids.forEach(id => {
            if (t.includes("missing")) updateStatus(id, 'missing', true);
            
            let mat = t.includes("composite") ? "composite" : (t.includes("gi") ? "gi" : null);
            if (mat) {
                if (t.includes("buccal") || t.includes(" b ")) setSurface(id, 'B', mat);
                if (t.includes("lingual") || t.includes(" l ")) setSurface(id, 'L', mat);
                if (t.includes("mo")) { setSurface(id, 'M', mat); setSurface(id, 'O', mat); }
                if (t.includes("occlusal") || t.includes(" o ")) setSurface(id, 'O', mat);
            }
        });
        speak("Updated");
    }

    /* --- MANUAL HELPERS --- */
    function setMode(m, voice = false) {
        appState = m;
        document.getElementById('btn-gen').classList.toggle('active', m === 'general');
        document.getElementById('btn-perio').classList.toggle('active', m === 'perio');
        document.getElementById('general-ui').style.display = m === 'general' ? 'block' : 'none';
        document.getElementById('perio-ui').style.display = m === 'perio' ? 'block' : 'none';
        if(voice) speak(`${m} mode active.`);
    }

    function manualMissing(id) { updateStatus(id, 'missing', !dentalData[id].missing); }
    function manualSurface(e, id, s) {
        e.stopPropagation();
        const mats = [null, 'composite', 'gi'];
        let next = mats[(mats.indexOf(dentalData[id].surfaces[s]) + 1) % mats.length];
        setSurface(id, s, next);
    }

    function updateStatus(id, key, val) {
        dentalData[id][key] = val;
        document.getElementById(`unit-${id}`).classList.toggle('t-missing', dentalData[id].missing);
    }

    function setSurface(id, s, mat) {
        dentalData[id].surfaces[s] = mat;
        document.getElementById(`${id}-${s}`).className.baseVal = "surface" + (mat ? ` c-${mat}` : "");
    }
</script>
</body>
</html>
