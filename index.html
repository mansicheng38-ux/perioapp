<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Voice Dental Chart</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --success: #16a34a; --danger: #dc2626; --text: #1e293b; --divider: #3b82f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        .header { background: #1e293b; color: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000; }
        #log-box { background: #0f172a; color: #38bdf8; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 16px; margin-top: 10px; }
        
        /* Grid Layouts with Quadrant Dividers */
        .chart-section { background: white; padding: 40px 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; max-width: 1200px; margin-left: auto; margin-right: auto; }
        
        /* The Cross Dividers */
        .v-line { position: absolute; left: 50%; top: 20px; bottom: 20px; width: 4px; background: var(--divider); transform: translateX(-50%); z-index: 1; opacity: 0.6; }
        .h-line { position: absolute; left: 20px; right: 20px; top: 50%; height: 4px; background: var(--divider); transform: translateY(-50%); z-index: 1; opacity: 0.6; }

        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 8px; margin-bottom: 30px; align-items: end; position: relative; z-index: 2; }
        
        /* Odontogram (General) */
        .tooth-card { display: flex; flex-direction: column; align-items: center; position: relative; background: white; padding: 5px; }
        .tooth-id { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .odontogram { width: 50px; height: 50px; background: white; border: 1px solid #cbd5e1; border-radius: 4px; position: relative; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; }
        
        /* Restorations & Status */
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        
        /* FIXED: Missing Overlay */
        .missing-overlay { display: none; position: absolute; top: 0; left: 0; width: 50px; height: 50px; pointer-events: none; z-index: 10; }
        .is-missing .missing-overlay { display: block; }
        .is-missing .missing-overlay::after { content: "X"; color: #ef4444; font-size: 55px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 100; font-family: sans-serif; }
        .is-missing .odontogram { opacity: 0.3; background: #f1f5f9; }
        
        .bridge-line { position: absolute; top: 25px; height: 6px; background: #3b82f6; width: 100%; z-index: 5; display: none; }
        
        /* Perio Table */
        .perio-container { max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; background: white; }
        th, td { border: 1px solid #cbd5e1; padding: 6px; text-align: center; }
        th { background: #f1f5f9; font-size: 14px; }
        .active-tooth { background: #fef08a !important; } 
        
        /* BPE & Dashboard */
        .dashboard { display: flex; justify-content: space-around; background: #e0f2fe; padding: 20px; border-radius: 8px; margin: 20px auto 80px auto; max-width: 1200px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; }
