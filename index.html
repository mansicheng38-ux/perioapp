<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Perio - Stable Fix</title>
    <style>
        :root { --primary: #8e44ad; --success: #27ae60; --danger: #e74c3c; --bg: #f8fafc; --tooth-border: #cbd5e1; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); text-align: center; padding: 10px; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto 20px; }
        .tooth-container { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-label { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #475569; }
        .odontogram { width: 60px; height: 60px; background: white; border: 1px solid var(--tooth-border); border-radius: 4px; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; transition: 0.2s; }
        .c-composite { fill: #3498db !important; }
        .c-gi { fill: #9b59b6 !important; }
        .c-caries { fill: #e74c3c !important; }
        .c-abrasion { fill: #f1c40f !important; }
        .t-missing .odontogram { opacity: 0.3; background: #e2e8f0; }
        .t-missing::after { content: '✕'; position: absolute; top: 30px; font-size: 50px; color: rgba(255,0,0,0.6); z-index: 3; left:50%; transform:translateX(-50%); }
        .t-implant .odontogram { border: 3px solid #34495e; border-radius: 50%; }
        .t-zirconia_crown .odontogram { background: #ecf0f1; outline: 3px solid #95a5a6; }
        .t-cmc_crown .odontogram { background: #dcdde1; outline: 3px solid #7f8c8d; }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #start-btn { padding: 15px 40px; font-size: 18px; border-radius: 30px; border: none; background: var(--success); color: white; cursor: pointer; font-weight: bold; }
        #live-box { background: #f3e5f5; padding: 10px; border-radius: 8px; color: #8e44ad; margin-top: 10px; font-weight: bold; min-height: 24px; font-size: 15px; }
        .thinking { animation: pulse 1s infinite !important; background: #ffeaa7 !important; color: #d35400 !important; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        #debug-info { font-size: 11px; color: #777; margin-top: 15px; text-align: left; padding: 10px; background: #eee; border-radius: 5px; max-width: 900px; margin-inline: auto; overflow-x: auto; }
    </style>
</head>
<body>

<div class="header">
    <div id="mode-title" style="font-weight: bold; font-size: 20px;">AI MODE: STANDBY</div>
    <div id="live-box">Press Start</div>
</div>

<div class="grid" id="upper-grid"></div>
<div class="grid" id="lower-grid"></div>

<div id="debug-info">Debug: Waiting for AI...</div>

<div class="controls">
    <button id="start-btn">Start Session</button>
</div>

<script>
    const uIds = ["18","17","16","15","14","13","12","11", "21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41", "31","32","33","34","35","36","37","38"];
    const teethData = {};
    let appState = "idle"; 

    window.onload = () => {
        const draw = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                teethData[id] = { status: 'normal', surfaces: {} };
                el.innerHTML += `
                <div class="tooth-container" id="container-${id}">
                    <div class="tooth-label">${id}</div>
                    <svg class="odontogram" id="svg-${id}" viewBox="0 0 100 100">
                        <path id="${id}-B" class="surface" d="M0 0 L100 0 L75 25 L25 25 Z" />
                        <path id="${id}-L" class="surface" d="M0 100 L100 100 L75 75 L25 75 Z" />
                        <path id="${id}-M" class="surface" d="M0 0 L25 25 L25 75 L0 100 Z" />
                        <path id="${id}-D" class="surface" d="M100 0 L75 25 L75 75 L100 100 Z" />
                        <rect id="${id}-O" class="surface" x="25" y="25" width="50" height="50" />
                    </svg>
                </div>`;
            });
        };
        draw(uIds, 'upper-grid'); draw(lIds, 'lower-grid');
    };

    function updateToothUI(id) {
        const container = document.getElementById(`container-${id}`);
        if (!container) return;
        const data = teethData[id];
        container.className = "tooth-container " + (data.status !== 'normal' ? `t-${data.status}` : "");
        ['B', 'L', 'M', 'D', 'O'].forEach(surf => {
            const path = document.getElementById(`${id}-${surf}`);
            if (path) {
                path.className.baseVal = "surface " + (data.surfaces[surf] ? `c-${data.surfaces[surf]}` : "");
            }
        });
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true; rec.interimResults = true;

    rec.onresult = (event) => {
        let finalStr = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) finalStr += event.results[i][0].transcript;
        }
        if (!finalStr) return;
        const text = finalStr.toLowerCase().trim();
        document.getElementById('live-box').innerText = "Hearing: " + text;
        handleVoiceCommand(text);
    };

    async function handleVoiceCommand(text) {
        if (appState === "selecting") {
            if (text.includes("general")) {
                appState = "charting";
                document.getElementById('mode-title').innerText = "AI MODE: GENERAL CHARTING";
                speak("General Charting confirmed.");
            } else if (text.includes("perio")) {
                appState = "charting";
                document.getElementById('mode-title').innerText = "AI MODE: PERIO CHARTING";
                speak("Perio Charting confirmed.");
            }
            return;
        }

        if (appState === "charting") {
            const liveBox = document.getElementById('live-box');
            liveBox.classList.add('thinking');
            liveBox.innerText = "Gemini Analyzing...";

            try {
                const response = await fetch('/api/gemini', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const aiData = await response.json();
                
                document.getElementById('debug-info').innerText = "AI JSON: " + JSON.stringify(aiData);

                let updated = false;
                if (Array.isArray(aiData)) {
                    aiData.forEach(item => {
                        const id = String(item.id);
                        if (teethData[id]) {
                            if (item.status) teethData[id].status = item.status;
                            if (item.surfaces) Object.assign(teethData[id].surfaces, item.surfaces);
                            updateToothUI(id);
                            updated = true;
                        }
                    });
                }

                if (updated) speak("Recorded.");
                liveBox.innerText = "Ready.";
            } catch (e) {
                document.getElementById('debug-info').innerText = "Error: " + e.message;
            } finally {
                liveBox.classList.remove('thinking');
            }
        }
    }

    document.getElementById('start-btn').onclick = () => {
        appState = "selecting";
        document.getElementById('mode-title').innerText = "SELECTING MODE...";
        speak("General or Perio?");
        try { rec.start(); } catch(e) {}
    };
</script>
</body>
</html>
