<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Perio Pro</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f1f5f9; margin: 0; }
        #status-bar { background: #1e293b; color: #38bdf8; padding: 15px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .chart-container { 
            position: relative; max-width: 1000px; margin: 20px auto; 
            background: white; padding: 40px 20px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .v-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #3498db; opacity: 0.3; }
        .h-line { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: #3498db; opacity: 0.3; }
        
        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; margin-bottom: 50px; position: relative; z-index: 2; }
        .tooth { border: 1px solid #ddd; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; background: white; transition: 0.3s; }
        
        /* The Red Cross for Missing Teeth */
        .missing { background: #fee2e2 !important; position: relative; }
        .missing::after {
            content: "X"; color: #ef4444; font-size: 40px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .controls { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-top: 1px solid #e2e8f0; }
        #btn { padding: 15px 60px; font-size: 18px; cursor: pointer; border-radius: 50px; border: none; background: #22c55e; color: white; font-weight: bold; }
        .error { color: #f87171; display: block; margin-top: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="state-text">Ready. Click Start.</span>
    <span id="error-msg" class="error"></span>
</div>

<div class="chart-container">
    <div class="v-line"></div><div class="h-line"></div>
    <div class="row" id="upper-row"></div>
    <div class="row" id="lower-row"></div>
</div>

<div class="controls">
    <button id="btn" onclick="startMic()">START MIC</button>
</div>

<script>
    // IDs in correct order: Upper Left (18-11), Upper Right (21-28)
    const uIds = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
    
    const draw = (list, target) => {
        const el = document.getElementById(target);
        list.forEach(id => {
            el.innerHTML += `<div class="tooth" id="t-${id}">${id}</div>`;
        });
    };
    draw(uIds, 'upper-row'); draw(lIds, 'lower-row');

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;

    async function processSpeech(text) {
        const stateEl = document.getElementById('state-text');
        const errEl = document.getElementById('error-msg');
        stateEl.innerText = "Analyzing: " + text;
        errEl.innerText = "";

        try {
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            const data = await response.json();

            if (data.fatalError) {
                errEl.innerText = "API Error: " + data.fatalError;
            } else if (Array.isArray(data)) {
                data.forEach(item => {
                    const tooth = document.getElementById('t-' + item.id);
                    if (tooth && item.status === 'missing') {
                        tooth.classList.add('missing');
                    }
                });
            }
        } catch (e) {
            errEl.innerText = "Connection Failed.";
        }
        stateEl.innerText = "Ready.";
    }

    rec.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript;
        processSpeech(result);
    };

    function startMic() {
        rec.start();
        document.getElementById('btn').innerText = "RECORDING...";
        document.getElementById('btn').style.background = "#ef4444";
        document.getElementById('state-text').innerText = "Listening...";
    }
</script>
</body>
</html>
