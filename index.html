<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voice Dental Chart - LOCAL ONLY</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --bg: #f8fafc; --divider: #3498db; }
        body { font-family: sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 0; }
        .header { background: white; padding: 20px; border-bottom: 3px solid var(--primary); }
        
        /* 臨床十字線與象限 */
        .chart-wrapper { 
            position: relative; max-width: 1050px; margin: 30px auto; 
            background: white; padding: 50px 20px; border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 70px;
        }
        .v-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--divider); transform: translateX(-50%); z-index: 1; opacity: 0.3; }
        .h-line { position: absolute; left: 0; right: 0; top: 50%; height: 4px; background: var(--divider); transform: translateY(-50%); z-index: 1; opacity: 0.3; }

        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 10px; position: relative; z-index: 2; }
        .tooth { border: 1px solid #cbd5e1; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; background: white; position: relative; }
        
        /* 紅色大叉叉 */
        .missing { background: #fee2e2 !important; }
        .missing::after {
            content: "X"; color: #e74c3c; font-size: 50px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 100;
        }

        .controls { position: fixed; bottom: 0; width: 100%; background: white; padding: 30px; border-top: 1px solid #eee; z-index: 1000; }
        #btn { padding: 20px 80px; font-size: 22px; border-radius: 60px; border: none; background: var(--success); color: white; cursor: pointer; font-weight: bold; }
        #status { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; color: #1e293b; min-height: 25px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 24px;">LOCAL DENTAL CHART (NO AI)</h1>
    <div id="status">Ready. Browser Voice Engine Active.</div>
</div>

<div class="chart-wrapper">
    <div class="v-line"></div><div class="h-line"></div>
    <div class="row" id="upper"></div>
    <div class="row" id="lower"></div>
</div>

<div class="controls">
    <button id="btn" onclick="toggleMic()">START SESSION</button>
</div>

<script>
    // 象限與牙位定義
    const uIds = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
    
    // 初始化繪圖
    const draw = (arr, t) => arr.forEach(id => document.getElementById(t).innerHTML += `<div class="tooth" id="t-${id}">${id}</div>`);
    draw(uIds, 'upper'); draw(lIds, 'lower');

    // 在地化邏輯：不需要 Gemini，直接比對關鍵字
    function processLocal(text) {
        let t = text.toLowerCase();
        
        // 數字糾錯 (One One -> 11)
        const numMap = { "one one": "11", "one four": "14", "one eight": "18", "four eight": "48" };
        for (let key in numMap) { t = t.replace(key, numMap[key]); }

        // 搜尋 FDI 牙位編號 (11-48)
        const match = t.match(/\b(1[1-8]|2[1-8]|3[1-8]|4[1-8])\b/g);
        if (!match) return;

        match.forEach(id => {
            const el = document.getElementById('t-' + id);
            if (!el) return;

            // 判斷動作：Missing (包含語音辨識出錯的 nissan, won't fall)
            if (t.includes("missing") || t.includes("nissan") || t.includes("won't fall") || t.includes("mising")) {
                el.classList.add('missing');
                speak("Tooth " + id.split('').join(' ') + " missing recorded.");
            }
        });
    }

    function speak(msg) {
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
    }

    // 語音引擎
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;

    rec.onresult = (event) => {
        const result = event.results[event.results.length - 1][0].transcript;
        document.getElementById('status').innerText = "Heard: " + result;
        processLocal(result);
    };

    let isRecording = false;
    function toggleMic() {
        const btn = document.getElementById('btn');
        if (!isRecording) {
            try {
                rec.start();
                isRecording = true;
                btn.innerText = "STOP SESSION";
                btn.style.background = "red";
                document.getElementById('status').innerText = "Mic Active. Try saying 'one one missing'";
                speak("Session started.");
            } catch(e) { alert("Mic error: " + e.message); }
        } else {
            rec.stop();
            isRecording = false;
            btn.innerText = "START SESSION";
            btn.style.background = "#27ae60";
            document.getElementById('status').innerText = "Session stopped.";
        }
    }
</script>
</body>
</html>
