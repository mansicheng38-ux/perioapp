<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Charting</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; max-width: 1000px; margin: 20px auto; padding: 20px; background: white; }
        .tooth { border: 1px solid #ccc; padding: 5px; position: relative; height: 50px; }
        .missing::after { content: 'X'; color: red; font-size: 40px; position: absolute; top:0; left:5px; }
        
        /* 偵錯專用樣式 */
        #error-display { background: #ff4d4f; color: white; padding: 10px; display: none; font-weight: bold; }
        #heard-display { background: #e6f7ff; padding: 10px; border-bottom: 2px solid #1890ff; font-weight: bold; }
        .controls { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-top: 1px solid #ddd; }
        button { padding: 15px 50px; font-size: 20px; cursor: pointer; background: #52c41a; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="error-display"></div>
<div id="heard-display">Heard: (Waiting for speech...)</div>

<div class="grid" id="main-grid"></div>

<div class="controls">
    <button id="start-btn">Click to Start Mic</button>
</div>

<script>
    const ids = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28",
                 "48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
    
    // 初始化牙位
    const grid = document.getElementById('main-grid');
    ids.forEach(id => {
        grid.innerHTML += `<div class="tooth" id="t-${id}">${id}</div>`;
    });

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;

    rec.onresult = async (event) => {
        const text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
        document.getElementById('heard-display').innerText = "Heard: " + text;
        
        // 發送到後端
        try {
            const res = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            const data = await res.json();

            // 如果後端報錯，直接顯示在螢幕上
            if (data.fatalError) {
                const errDiv = document.getElementById('error-display');
                errDiv.innerText = "API ERROR: " + data.fatalError;
                errDiv.style.display = "block";
                return;
            }

            // 繪圖邏輯
            if (Array.isArray(data)) {
                data.forEach(item => {
                    const el = document.getElementById('t-' + item.id);
                    if (el && item.status === 'missing') el.classList.add('missing');
                });
            }
        } catch (e) {
            alert("Network Error: " + e.message);
        }
    };

    document.getElementById('start-btn').onclick = () => {
        rec.start();
        document.getElementById('start-btn').innerText = "Listening...";
        document.getElementById('start-btn').style.background = "red";
    };
</script>
</body>
</html>
