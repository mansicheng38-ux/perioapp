<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Voice Dental Chart</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --success: #16a34a; --danger: #dc2626; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        .header { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000; }
        #log-box { background: #1e293b; color: #38bdf8; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 16px; margin-top: 10px; }
        
        /* Grid Layouts */
        .chart-section { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; margin-bottom: 20px; align-items: end; }
        
        /* Odontogram (General) */
        .tooth-card { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-id { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .odontogram { width: 50px; height: 50px; background: white; border: 1px solid #cbd5e1; border-radius: 4px; position: relative; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; }
        
        /* Restorations & Status */
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        .missing::after { content: "X"; color: #ef4444; font-size: 50px; position: absolute; top: 0; left: 0; font-weight: 100; pointer-events: none; }
        .bridge-line { position: absolute; top: 25px; height: 4px; background: #3b82f6; width: 100%; z-index: 5; display: none; }
        
        /* Perio Table */
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        th { background: #f1f5f9; }
        .active-tooth { background: #fef08a !important; } /* Highlights tooth being probed */
        
        /* BPE & Dashboard */
        .dashboard { display: flex; justify-content: space-around; background: #e0f2fe; padding: 15px; border-radius: 8px; margin-bottom: 80px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; }
        .bpe-grid div { background: white; padding: 15px 20px; font-weight: bold; font-size: 20px; }

        /* Controls */
        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; }
        button { padding: 15px 40px; font-size: 18px; border-radius: 50px; border: none; background: var(--success); color: white; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="mode-title" style="margin:0;">SYSTEM STANDBY</h1>
    <div id="log-box">HEARD: Click Start Session to begin</div>
</div>

<div class="chart-section" id="general-chart">
    <h3>General Charting</h3>
    <div class="row" id="upper-grid"></div>
    <div class="row" id="lower-grid"></div>
</div>

<div class="chart-section" id="perio-chart">
    <h3>Periodontal Charting</h3>
    <table id="perio-table-upper"></table>
    <table id="perio-table-lower"></table>
</div>

<div class="dashboard">
    <div>
        <h3>BPE Score</h3>
        <div class="bpe-grid">
            <div id="bpe-s1">-</div><div id="bpe-s2">-</div><div id="bpe-s3">-</div>
            <div id="bpe-s6">-</div><div id="bpe-s5">-</div><div id="bpe-s4">-</div>
        </div>
    </div>
    <div>
        <h3>Bleeding on Probing</h3>
        <div style="font-size: 32px; font-weight: bold; color: #dc2626;" id="bop-percent">0%</div>
    </div>
</div>

<div class="controls">
    <button id="start-btn" onclick="toggleMic()">START SESSION</button>
</div>

<script>
    /* --- DATA STRUCTURES --- */
    const upperTeeth = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28];
    const lowerTeeth = [48,47,46,45,44,43,42,41, 31,32,33,34,35,36,37,38];
    const allTeeth = [...upperTeeth, ...lowerTeeth];
    
    let dentalData = {};
    allTeeth.forEach(id => {
        dentalData[id] = {
            missing: false, bridge: false, surfaces: {}, 
            pd: { buccal: ["","",""], palatal: ["","",""] }, 
            bop: { buccal: [0,0,0], palatal: [0,0,0] },
            recession: "", mobility: ""
        };
    });

    let appState = "idle"; // init, general, perio
    let recordingLog = [];
    
    /* --- PERIO STATE MACHINE --- */
    let perioPhaseIndex = 0;
    let currentToothIndex = 0;
    const perioSequence = [
        { name: "Upper Buccal Probing", type: "PD", side: "buccal", teeth: [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28], prompt: "Start probing depth, 18 to 28 buccal." },
        { name: "Upper Buccal BOP", type: "BOP", side: "buccal", teeth: [28,27,26,25,24,23,22,21,11,12,13,14,15,16,17,18], prompt: "Record BOP from 28 to 18 buccal." },
        { name: "Upper Palatal Probing", type: "PD", side: "palatal", teeth: [28,27,26,25,24,23,22,21,11,12,13,14,15,16,17,18], prompt: "To palatal. Probing depth 28 to 18." },
        { name: "Upper Palatal BOP", type: "BOP", side: "palatal", teeth: [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28], prompt: "Record BOP 18 to 28 palatal." },
        { name: "Lower Buccal Probing", type: "PD", side: "buccal", teeth: [38,37,36,35,34,33,32,31,41,42,43,44,45,46,47,48], prompt: "Lower arch. Probing depth 38 to 48 buccal." },
        { name: "Lower Buccal BOP", type: "BOP", side: "buccal", teeth: [48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38], prompt: "Record BOP 48 to 38 buccal." },
        { name: "Lower Lingual Probing", type: "PD", side: "palatal", teeth: [48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38], prompt: "To lingual. Probing depth 48 to 38." },
        { name: "Lower Lingual BOP", type: "BOP", side: "palatal", teeth: [38,37,36,35,34,33,32,31,41,42,43,44,45,46,47,48], prompt: "Record BOP 38 to 48 lingual." },
        { name: "Recession", type: "FREE_RECESSION", teeth: [], prompt: "Record recession. Say tooth number and value." },
        { name: "Mobility", type: "FREE_MOBILITY", teeth: [], prompt: "Record mobility. Say tooth number and value." }
    ];

    /* --- INITIALIZATION & RENDERING --- */
    window.onload = () => {
        const renderGrid = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                el.innerHTML += `
                <div class="tooth-card" id="tc-${id}">
                    <div class="bridge-line" id="br-${id}"></div>
                    <div class="tooth-id">${id}</div>
                    <div style="position:relative; width:50px; height:50px;">
                        <svg class="odontogram" viewBox="0 0 100 100">
                            <path id="${id}-B" class="surface" d="M0 0 L100 0 L75 25 L25 25 Z" />
                            <path id="${id}-L" class="surface" d="M0 100 L100 100 L75 75 L25 75 Z" />
                            <path id="${id}-M" class="surface" d="M0 0 L25 25 L25 75 L0 100 Z" />
                            <path id="${id}-D" class="surface" d="M100 0 L75 25 L75 75 L100 100 Z" />
                            <rect id="${id}-O" class="surface" x="25" y="25" width="50" height="50" />
                        </svg>
                        <div class="missing" id="mx-${id}"></div>
                    </div>
                </div>`;
            });
        };
        renderGrid(upperTeeth, 'upper-grid');
        renderGrid(lowerTeeth, 'lower-grid');
        renderPerioTable();
    };

    function renderPerioTable() {
        const buildTable = (ids) => {
            let html = `<tr><th>Tooth</th>` + ids.map(id => `<th id="th-${id}">${id}</th>`).join('') + `</tr>`;
            html += `<tr><td>Mobility</td>` + ids.map(id => `<td id="mob-${id}"></td>`).join('') + `</tr>`;
            html += `<tr><td>Recession</td>` + ids.map(id => `<td id="rec-${id}"></td>`).join('') + `</tr>`;
            html += `<tr><td>PD (Buc)</td>` + ids.map(id => `<td id="pdb-${id}"></td>`).join('') + `</tr>`;
            html += `<tr><td>PD (Pal)</td>` + ids.map(id => `<td id="pdp-${id}"></td>`).join('') + `</tr>`;
            return html;
        };
        document.getElementById('perio-table-upper').innerHTML = buildTable(upperTeeth);
        document.getElementById('perio-table-lower').innerHTML = buildTable(lowerTeeth);
    }

    /* --- SPEECH ENGINE & UTILS --- */
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;

    function speak(msg) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(msg);
        window.speechSynthesis.speak(u);
    }

    function log(msg) {
        document.getElementById('log-box').innerText = "HEARD: " + msg;
    }

    function toggleMic() {
        const btn = document.getElementById('start-btn');
        if (appState === "idle") {
            rec.start();
            appState = "init";
            btn.innerText = "STOP SESSION";
            btn.style.background = "var(--danger)";
            speak("General or Periodontal?");
            log("Waiting for Mode Selection...");
        } else {
            location.reload(); 
        }
    }

    /* --- TEXT PARSING ENGINE --- */
    function normalizeSpeech(text) {
        let t = text.toLowerCase().trim();
        // Smart Numbering
        const words = { 'one': '1', 'two': '2', 'three': '3', 'four': '4', 'five': '5', 'six': '6', 'seven': '7', 'eight': '8' };
        for (let [w, d] of Object.entries(words)) {
            t = t.replace(new RegExp(`\\b${w}\\b`, 'g'), d);
        }
        // "1 1" -> "11"
        t = t.replace(/\b([1-4])\s+([1-8])\b/g, "$1$2");
        // "3 2 3" -> "323"
        t = t.replace(/\b(\d)\s+(\d)\s+(\d)\b/g, "$1$2$3");
        
        // Aliases
        t = t.replace(/periodontal/g, 'perio');
        t = t.replace(/mesial occlusal/g, 'mo');
        return t;
    }

    rec.onresult = (e) => {
        const raw = e.results[e.results.length - 1][0].transcript;
        recordingLog.push(raw);
        const text = normalizeSpeech(raw);
        log(text);

        // Global Playback Command
        if (text.includes("play back recording") || text.includes("playback")) {
            speak("Playing back recording: " + recordingLog.join(". "));
            return;
        }

        if (appState === "init") {
            if (text.includes("general")) {
                appState = "general";
                document.getElementById('mode-title').innerText = "GENERAL CHARTING";
                speak("General mode activated.");
            } else if (text.includes("perio")) {
                appState = "perio";
                document.getElementById('mode-title').innerText = "PERIODONTAL CHARTING";
                speak(perioSequence[perioPhaseIndex].prompt);
            }
        } else if (appState === "general") {
            processGeneral(text);
        } else if (appState === "perio") {
            processPerio(text);
        }
    };

    /* --- GENERAL CHARTING LOGIC --- */
    function processGeneral(t) {
        // Handle Ranges (e.g. "18 to 13 missing")
        const rangeMatch = t.match(/(\d{2})\s*to\s*(\d{2})\s*(missing|bridge)/);
        let targetTeeth = [];
        
        if (rangeMatch) {
            let start = parseInt(rangeMatch[1]), end = parseInt(rangeMatch[2]);
            let min = Math.min(start, end), max = Math.max(start, end);
            targetTeeth = allTeeth.filter(id => id >= min && id <= max && Math.floor(id/10) === Math.floor(start/10));
            
            if (rangeMatch[3] === "bridge") {
                targetTeeth.forEach(id => { 
                    dentalData[id].bridge = true; 
                    document.getElementById(`br-${id}`).style.display = 'block'; 
                });
                speak(`Bridge from ${start} to ${end}`);
                return;
            } else if (rangeMatch[3] === "missing") {
                targetTeeth.forEach(id => markMissing(id));
                speak(`Missing from ${start} to ${end}`);
                return;
            }
        }

        // Handle Individual Teeth
        const matches = t.match(/\b([1-4][1-8])\b/g);
        if (!matches) return;

        matches.forEach(id => {
            if (t.includes("missing")) {
                markMissing(id);
                speak(`${id} missing`);
            }
            
            // Restorations (e.g. "14 mo composite", "13 buccal gi")
            let mat = t.includes("composite") ? "composite" : (t.includes("gi") ? "gi" : null);
            if (mat) {
                if (t.includes("mo")) { setSurface(id, 'M', mat); setSurface(id, 'O', mat); speak(`${id} M O ${mat}`); }
                if (t.includes("buccal") || t.includes(" b ")) { setSurface(id, 'B', mat); speak(`${id} buccal ${mat}`); }
                if (t.includes("lingual") || t.includes("palatal")) { setSurface(id, 'L', mat); speak(`${id} palatal ${mat}`); }
                if (t.includes("occlusal") || t.includes(" o ")) { setSurface(id, 'O', mat); }
            }
        });
    }

    function markMissing(id) {
        dentalData[id].missing = true;
        document.getElementById(`mx-${id}`).classList.add('missing');
        document.getElementById(`tc-${id}`).style.opacity = "0.4";
    }

    function setSurface(id, surface, material) {
        dentalData[id].surfaces[surface] = material;
        document.getElementById(`${id}-${surface}`).className.baseVal = "surface c-" + material;
    }

    /* --- PERIODONTAL CHARTING LOGIC --- */
    function processPerio(t) {
        const phase = perioSequence[perioPhaseIndex];

        // Freeform Phases (Recession, Mobility)
        if (phase.type.includes("FREE")) {
            const matches = t.match(/\b([1-4][1-8])\b/);
            if (!matches) return;
            const id = matches[1];
            
            if (phase.type === "FREE_RECESSION") {
                const val = t.match(/(\d+)\s*(mm|millimeters)?$/);
                if (val) {
                    dentalData[id].recession = val[1];
                    document.getElementById(`rec-${id}`).innerText = val[1];
                    speak(`Recession ${val[1]} on ${id}`);
                }
            } else if (phase.type === "FREE_MOBILITY") {
                const val = t.match(/mobility\s*([1-3]|i{1,3})/);
                if (val) {
                    dentalData[id].mobility = val[1].toUpperCase();
                    document.getElementById(`mob-${id}`).innerText = val[1].toUpperCase();
                    speak(`Mobility ${val[1]} on ${id}`);
                }
            }
            return;
        }

        // Sequential Phases (PD & BOP)
        const tooth = phase.teeth[currentToothIndex];
        const nextTooth = phase.teeth[currentToothIndex + 1];
        
        // UI Highlight
        document.querySelectorAll('th').forEach(th => th.classList.remove('active-tooth'));
        document.getElementById(`th-${tooth}`).classList.add('active-tooth');

        const digits = t.replace(/[^0-9]/g, '');
        if (digits.length === 3) {
            const vals = digits.split('');
            
            if (phase.type === "PD") {
                dentalData[tooth].pd[phase.side] = vals;
                let cellId = phase.side === "buccal" ? `pdb-${tooth}` : `pdp-${tooth}`;
                document.getElementById(cellId).innerText = vals.join(' ');
                speak(`Recorded ${vals.join(' ')}`);
                calculateBPE();
            } else if (phase.type === "BOP") {
                dentalData[tooth].bop[phase.side] = vals.map(v => parseInt(v));
                let cellId = phase.side === "buccal" ? `pdb-${tooth}` : `pdp-${tooth}`;
                document.getElementById(cellId).style.color = vals.includes('1') ? "red" : "black";
                speak(`Recorded`);
                calculateBOP();
            }

            // Move to next tooth
            currentToothIndex++;
            
            // Midline Check
            if (nextTooth && ((tooth == 11 && nextTooth == 21) || (tooth == 31 && nextTooth == 41) || (tooth == 21 && nextTooth == 11) || (tooth == 41 && nextTooth == 31))) {
                setTimeout(() => speak("Through midline"), 1500);
            }

            // Phase Complete
            if (currentToothIndex >= phase.teeth.length) {
                currentToothIndex = 0;
                perioPhaseIndex++;
                if (perioPhaseIndex < perioSequence.length) {
                    setTimeout(() => speak(perioSequence[perioPhaseIndex].prompt), 1000);
                } else {
                    speak("Periodontal charting complete.");
                }
            }
        }
    }

    /* --- CALCULATIONS --- */
    function calculateBOP() {
        let positive = 0; let total = 0;
        allTeeth.forEach(id => {
            ['buccal', 'palatal'].forEach(side => {
                dentalData[id].bop[side].forEach(val => {
                    if (dentalData[id].pd[side][0] !== "") { // Only count probed sites
                        total++;
                        if (val === 1) positive++;
                    }
                });
            });
        });
        const pct = total === 0 ? 0 : Math.round((positive/total)*100);
        document.getElementById('bop-percent').innerText = `${pct}%`;
    }

    function calculateBPE() {
        const sextants = {
            s1: [18,17,16,15,14], s2: [13,12,11,21,22,23], s3: [24,25,26,27,28],
            s6: [48,47,46,45,44], s5: [43,42,41,31,32,33], s4: [34,35,36,37,38]
        };

        for (let s in sextants) {
            let maxPd = 0;
            sextants[s].forEach(id => {
                ['buccal', 'palatal'].forEach(side => {
                    dentalData[id].pd[side].forEach(val => {
                        let num = parseInt(val);
                        if (!isNaN(num) && num > maxPd) maxPd = num;
                    });
                });
            });

            let code = "-";
            if (maxPd > 0) {
                if (maxPd < 3.5) code = "0/1/2"; 
                if (maxPd >= 3.5 && maxPd < 5.5) code = "3";
                if (maxPd >= 5.5) code = "4";
            }
            document.getElementById(`bpe-${s}`).innerText = code;
        }
    }
</script>
</body>
</html>
