<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Perio - Gemini AI</title>
    <style>
        :root { --primary: #8e44ad; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; text-align: center; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-width: 900px; margin: 0 auto 20px; }
        .tooth { background: white; border: 1px solid #ddd; padding: 15px 5px; border-radius: 8px; font-weight: bold; height: 55px; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; }
        .tooth.missing { background: #455a64 !important; color: white; opacity: 0.7; }
        .tooth.missing::after { content: '✕'; position: absolute; font-size: 35px; color: rgba(255,0,0,0.5); }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 25px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #start-btn { padding: 18px 60px; font-size: 20px; border-radius: 40px; border: none; background: var(--success); color: white; cursor: pointer; font-weight: bold; }
        #live-box { background: #f3e5f5; padding: 10px; border-radius: 8px; color: #8e44ad; margin-top: 10px; font-weight: bold; min-height: 24px; font-size: 15px; transition: 0.3s; }
        .thinking { animation: pulse 1.5s infinite; background: #ffeaa7 !important; color: #d35400 !important; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; font-size: 20px;">AI MODE: GENERAL CHARTING</div>
    <div id="live-box">System Ready. Click Start.</div>
</div>

<div class="grid" id="upper-grid"></div>
<div class="grid" id="lower-grid"></div>

<div class="controls">
    <button id="start-btn">Start Session</button>
</div>

<script>
    const uIds = [18,17,16,15,14,13,12,11, 21,22,23,24,25,26,27,28];
    const lIds = [48,47,46,45,44,43,42,41, 31,32,33,34,35,36,37,38];
    const teethData = {};
    let silenceTimer, accumulatedText = "";

    window.onload = () => {
        const draw = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                teethData[id] = { missing: false };
                const div = document.createElement('div');
                div.className = 'tooth'; div.id = `t-${id}`; div.innerText = id;
                el.appendChild(div);
            });
        };
        draw(uIds, 'upper-grid'); draw(lIds, 'lower-grid');
    };

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (event) => {
        let interim = "", finalStr = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) finalStr += event.results[i][0].transcript + " ";
            else interim += event.results[i][0].transcript;
        }

        const currentText = (accumulatedText + finalStr + interim).toLowerCase();
        const liveBox = document.getElementById('live-box');
        
        if (!liveBox.classList.contains('thinking')) {
            liveBox.innerText = "Hearing: " + currentText;
        }

        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (currentText.trim()) {
                sendToGemini(currentText);
                accumulatedText = ""; 
            }
        }, 1500); // Wait 1.5s for you to finish talking, then send to AI
    };

    async function sendToGemini(text) {
        const liveBox = document.getElementById('live-box');
        liveBox.classList.add('thinking');
        liveBox.innerText = "Gemini is analyzing...";

        try {
            // Talk to your new secure backend!
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            
            const aiData = await response.json(); 
            
            liveBox.classList.remove('thinking');

            if (Array.isArray(aiData) && aiData.length > 0) {
                let marked = [], spokenNums = [];
                aiData.forEach(n => {
                    if (teethData[n] && !teethData[n].missing) {
                        teethData[n].missing = true;
                        document.getElementById(`t-${n}`).classList.add('missing');
                        marked.push(n);
                        spokenNums.push(n.toString().split('').join(' ')); 
                    }
                });

                if(marked.length > 0) {
                    liveBox.innerText = `AI Confirmed: ${marked.join(", ")}`;
                    speak(`Recorded ${spokenNums.join(", ")} missing.`);
                } else {
                    liveBox.innerText = "Ready for next command.";
                }
            } else {
                liveBox.innerText = "AI didn't detect any new missing teeth.";
            }

        } catch (error) {
            liveBox.classList.remove('thinking');
            liveBox.innerText = "Network Error connecting to AI.";
            console.error(error);
        }
    }

    document.getElementById('start-btn').onclick = async () => {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            rec.start();
            document.getElementById('start-btn').innerText = "SYSTEM ACTIVE";
            document.getElementById('start-btn').style.background = "#e74c3c";
            speak("Gemini AI is online. Describe the missing teeth.");
        } catch (e) { alert("Mic Error: " + e.message); }
    };
</script>
</body>
</html>
