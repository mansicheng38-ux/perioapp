<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Dental Charting AI</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #16a34a; --danger: #dc2626; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; text-align: center; }
        
        .header-panel { background: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 10px; z-index: 1000; }
        .patient-box input { font-size: 16px; padding: 8px; border: 2px solid #cbd5e1; border-radius: 6px; font-weight: bold; width: 200px; }
        .mode-btn { padding: 10px 25px; font-weight: bold; cursor: pointer; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; margin: 0 5px; }
        .mode-btn.active { background: var(--primary); color: white; }

        #log-box { background: #1e293b; color: #38bdf8; padding: 12px; margin: 10px 0; border-radius: 8px; font-family: monospace; font-size: 16px; font-weight: bold; }

        .chart-section { background: white; padding: 30px 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .row-container { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .legend-label { font-weight: bold; color: #64748b; font-size: 12px; width: 30px; text-align: right; display: flex; flex-direction: column; justify-content: space-between; height: 50px; }
        .grid-row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; flex-grow: 1; position: relative; }
        .v-divider { position: absolute; left: 50%; top: -10px; bottom: -10px; width: 4px; background: rgba(37, 99, 235, 0.3); transform: translateX(-50%); }

        .tooth-unit { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-id { font-weight: bold; font-size: 14px; margin-bottom: 4px; cursor: pointer; padding: 2px 5px; border-radius: 3px; }
        .tooth-id:hover { background: #e2e8f0; }
        
        .odontogram { width: 50px; height: 50px; background: white; border: 1px solid #cbd5e1; position: relative; cursor: pointer; }
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; transition: 0.1s; }
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        
        .bridge-line { position: absolute; top: 23px; width: 100%; height: 6px; background: #3b82f6; display: none; z-index: 5; pointer-events: none; }
        .missing-mark { display: none; position: absolute; top: 0; left: 0; width: 50px; height: 50px; pointer-events: none; z-index: 10; }
        .t-missing .missing-mark { display: block; }
        .t-missing .odontogram { opacity: 0.2; }

        .perio-ui { display: none; background: white; padding: 20px; border-radius: 12px; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        th, td { border: 1px solid #cbd5e1; padding: 5px; text-align: center; }
        .active-cell { background: #fef08a !important; font-weight: bold; color: #b45309; }
        input.p-in { width: 35px; text-align: center; border: 1px solid #ddd; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 80px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; width: fit-content; margin: 10px auto; }
        .bpe-grid div { background: white; padding: 10px 20px; font-weight: bold; font-size: 20px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 1000; }
        #mic-btn { padding: 15px 60px; border-radius: 50px; border: none; background: var(--success); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .recording { background: var(--danger) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header-panel">
    <div class="patient-box"><b>Patient:</b> <input type="text" placeholder="ID..."></div>
    <div>
        <button class="mode-btn" id="btn-gen" onclick="setMode('general', true)">General</button>
        <button class="mode-btn" id="btn-perio" onclick="setMode('perio', true)">Periodontal</button>
    </div>
</div>

<div id="log-box">SYSTEM STANDBY. Press Start Session.</div>

<div class="chart-section" id="general-ui">
    <div class="row-container">
        <div class="legend-label"><span>B</span><span>L</span></div>
        <div class="grid-row" id="u-row"><div class="v-divider"></div></div>
    </div>
    <div class="row-container">
        <div class="legend-label"><span>B</span><span>L</span></div>
        <div class="grid-row" id="l-row"><div class="v-divider"></div></div>
    </div>
</div>

<div class="perio-ui" id="perio-ui">
    <table id="table-upper"></table>
    <table id="table-lower"></table>
</div>

<div class="dashboard">
    <div style="background:white; border-radius:12px; padding:15px;">
        <h3>BPE Score</h3>
        <div class="bpe-grid">
            <div id="bpe-1">-</div><div id="bpe-2">-</div><div id="bpe-3">-</div>
            <div id="bpe-6">-</div><div id="bpe-5">-</div><div id="bpe-4">-</div>
        </div>
    </div>
    <div style="background:white; border-radius:12px; padding:15px;">
        <h3>BOP %</h3>
        <div id="bop-stat" style="font-size: 40px; font-weight: bold; color: var(--danger);">0%</div>
    </div>
</div>

<div class="footer">
    <button id="mic-btn" onclick="toggleMic()">START SESSION</button>
</div>

<script>
    const uIds = ["18","17","16","15","14","13","12","11","21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41","31","32","33","34","35","36","37","38"];
    const allIds = [...uIds, ...lIds];
    
    let dentalData = {};
    let appState = "idle"; 
    let audioLog = [];
    let isMicActive = false; 
    
    let perioStep = 0;
    let toothIndex = 0;
    const pSeq = [
        { label: "Upper Buccal PD", type: "PD", side: "b", teeth: uIds, msg: "Start probing depth, 18 distal buccal to 28 distal buccal." },
        { label: "Upper Buccal BOP", type: "BOP", side: "b", teeth: [...uIds].reverse(), msg: "Record BOP, 28 to 18 buccal." },
        { label: "Upper Palatal PD", type: "PD", side: "p", teeth: [...uIds].reverse(), msg: "To palatal. Probing depth 28 to 18." },
        { label: "Upper Palatal BOP", type: "BOP", side: "p", teeth: uIds, msg: "Record BOP, 18 to 28 palatal." },
        { label: "Lower Buccal PD", type: "PD", side: "b", teeth: [...lIds].reverse(), msg: "Lower arch. Probing depth 38 to 48 buccal." },
        { label: "Lower Buccal BOP", type: "BOP", side: "b", teeth: lIds, msg: "Record BOP, 48 to 38 buccal." },
        { label: "Lower Lingual PD", type: "PD", side: "p", teeth: lIds, msg: "To lingual. Probing depth 48 to 38." },
        { label: "Lower Lingual BOP", type: "BOP", side: "p", teeth: [...lIds].reverse(), msg: "Record BOP, 38 to 48 lingual." },
        { label: "Recession", type: "REC", msg: "Record recession mid-buccal." },
        { label: "Mobility", type: "MOB", msg: "Record mobility." }
    ];

    allIds.forEach(id => { dentalData[id] = { missing: false, bridge: false, surfaces: {}, pd: {b:[], p:[]}, bop: {b:[], p:[]}, rec: "", mob: "" }; });

    window.onload = () => {
        const renderGen = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                let isLeft = ["1","4"].includes(id[0]); 
                let mPath = isLeft ? 'M100 0 L80 20 L80 80 L100 100 Z' : 'M0 0 L20 20 L20 80 L0 100 Z';
                let dPath = isLeft ? 'M0 0 L20 20 L20 80 L0 100 Z' : 'M100 0 L80 20 L80 80 L100 100 Z';
                el.innerHTML += `
                <div class="tooth-unit" id="unit-${id}">
                    <div class="tooth-id" onclick="manualStatus('${id}', 'missing')">${id}</div>
                    <div class="bridge-line" id="br-${id}"></div>
                    <div style="position:relative; width:50px; height:50px;">
                        <svg class="odontogram" viewBox="0 0 100 100">
                            <path id="${id}-B" class="surface" d="M0 0 L100 0 L80 20 L20 20 Z" onclick="manualSurface('${id}','B')"/>
                            <path id="${id}-L" class="surface" d="M0 100 L100 100 L80 80 L20 80 Z" onclick="manualSurface('${id}','L')"/>
                            <path id="${id}-M" class="surface" d="${mPath}" onclick="manualSurface('${id}','M')"/>
                            <path id="${id}-D" class="surface" d="${dPath}" onclick="manualSurface('${id}','D')"/>
                            <rect id="${id}-O" class="surface" x="20" y="20" width="60" height="60" onclick="manualSurface('${id}','O')"/>
                        </svg>
                        <svg class="missing-mark" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" stroke="red" stroke-width="8"/><line x1="100" y1="0" x2="0" y2="100" stroke="red" stroke-width="8"/></svg>
                    </div>
                </div>`;
            });
        };
        renderGen(uIds, 'u-row'); renderGen(lIds, 'l-row');

        const renderPerio = (ids, target) => {
            let h = `<tr><th>ID</th>` + ids.map(id => `<th id="pth-${id}">${id}</th>`).join('') + `</tr>`;
            h += `<tr><td>MOB</td>` + ids.map(id => `<td><input class="p-in" id="pmob-${id}" oninput="manualPerio()"></td>`).join('') + `</tr>`;
            h += `<tr><td>REC</td>` + ids.map(id => `<td><input class="p-in" id="prec-${id}" oninput="manualPerio()"></td>`).join('') + `</tr>`;
            h += `<tr><td>PDB</td>` + ids.map(id => `<td><input class="p-in" id="pdb-${id}" oninput="manualPerio()"></td>`).join('') + `</tr>`;
            h += `<tr><td>PDP</td>` + ids.map(id => `<td><input class="p-in" id="pdp-${id}" oninput="manualPerio()"></td>`).join('') + `</tr>`;
            document.getElementById(target).innerHTML = h;
        };
        renderPerio(uIds, 'table-upper'); renderPerio(lIds, 'table-lower');
    };

    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'en-US'; rec.continuous = true;
    rec.onend = () => { if (isMicActive) { try { rec.start(); } catch(e) {} } };

    function speak(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

    function toggleMic() {
        if(!isMicActive) {
            isMicActive = true;
            appState = "init";
            document.getElementById('mic-btn').classList.add('recording');
            document.getElementById('mic-btn').innerText = "STOP SESSION";
            try { rec.start(); } catch(e) {}
            speak("System started. Please click General or Periodontal button to begin.");
            document.getElementById('log-box').innerText = "CLICK A BLUE BUTTON (General / Periodontal) TO START";
        } else { 
            isMicActive = false; rec.stop(); location.reload(); 
        }
    }

    rec.onresult = async (e) => {
        let raw = e.results[e.results.length - 1][0].transcript;
        audioLog.push(raw);
        let t = raw.toLowerCase().trim();

        if (t.includes("play back recording")) { speak("Recording: " + audioLog.join(". ")); return; }

        if (appState === "init") {
            // 移除了用語音判斷 general，強制要求使用者手動點擊右上角按鈕，徹底解決雜音誤判
            document.getElementById('log-box').innerText = "PLEASE CLICK A MODE BUTTON: " + t;
        } else if (appState === "general") {
            document.getElementById('log-box').innerText = "AI Analyzing: " + t;
            try {
                let res = await fetch('/api/gemini', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: t}) });
                let data = await res.json();
                
                if (!data.error && Array.isArray(data)) { 
                    applyAI(data); 
                    speak("Updated."); 
                    document.getElementById('log-box').innerHTML = `<span style="color:#10b981;">SUCCESS: ${t}</span>`;
                } else if (data.error) { 
                    document.getElementById('log-box').innerHTML = `<span style="color:#ef4444;">API ERROR: ${data.error}</span>`;
                } else {
                    document.getElementById('log-box').innerHTML = `<span style="color:#ef4444;">PARSE ERROR: Invalid JSON Format</span>`;
                }
            } catch(err) { 
                document.getElementById('log-box').innerHTML = `<span style="color:#ef4444;">NETWORK ERROR: ${err.message}</span>`;
            }
        } else if (appState === "perio") {
            document.getElementById('log-box').innerText = "HEARD: " + t;
            processPerio(t);
        }
    };

    // 點擊按鈕切換模式，確保不被雜音干擾
    function setMode(m, isClick=false) {
        if (!isMicActive && isClick) toggleMic(); // 如果還沒按 START，點擊模式會自動啟動麥克風
        
        appState = m;
        document.getElementById('btn-gen').classList.toggle('active', m === 'general');
        document.getElementById('btn-perio').classList.toggle('active', m === 'perio');
        document.getElementById('general-ui').style.display = m === 'general' ? 'block' : 'none';
        document.getElementById('perio-ui').style.display = m === 'perio' ? 'block' : 'none';
        
        speak(m === 'general' ? "General active. Start speaking." : pSeq[0].msg);
        document.getElementById('log-box').innerText = "MODE SET: " + m.toUpperCase();
    }

    function applyAI(actions) {
        actions.forEach(a => {
            if(a.teeth) {
                a.teeth.forEach(id => {
                    if (a.type === "missing") updateStatus(id, 'missing', true);
                    if (a.type === "bridge") updateStatus(id, 'bridge', true);
                    if (a.type === "surface" && a.surfaces) a.surfaces.forEach(s => setSurface(id, s, a.material));
                });
            }
        });
    }

    function processPerio(t) {
        const step = pSeq[perioStep];
        if (!step) return;

        if (step.type === "REC" || step.type === "MOB") {
            let tFormat = t.replace(/one one/g, "11").replace(/two one/g,"21").replace(/\b(\d)\s+(\d)\b/g, "$1$2");
            let idMatch = tFormat.match(/\b([1-4][1-8])\b/);
            if (!idMatch) return;
            let id = idMatch[1];

            if (step.type === "REC" && tFormat.match(/recession\s*(\d+)/)) {
                let v = tFormat.match(/recession\s*(\d+)/)[1];
                document.getElementById(`prec-${id}`).value = v; dentalData[id].rec = v; speak(`Recession ${v}`);
            }
            if (step.type === "MOB" && tFormat.match(/mobility\s*(1|2|3|i{1,3})/)) {
                let v = tFormat.match(/mobility\s*(1|2|3|i{1,3})/)[1].toUpperCase();
                document.getElementById(`pmob-${id}`).value = v; dentalData[id].mob = v; speak(`Mobility ${v}`);
            }
            return;
        }

        let tooth = step.teeth[toothIndex];
        let nextTooth = step.teeth[toothIndex + 1];

        allIds.forEach(id => { let th = document.getElementById(`pth-${id}`); if(th) th.classList.remove('active-cell'); });
        document.getElementById(`pth-${tooth}`).classList.add('active-cell');

        let digits = t.replace(/\s+/g, '').match(/\d{3}/);
        if (digits) {
            let vals = digits[0].split('');
            let prefix = step.side === "b" ? "pdb" : "pdp";
            
            if (step.type === "PD") {
                dentalData[tooth].pd[step.side] = vals;
                document.getElementById(`${prefix}-${tooth}`).value = vals.join('');
            } else {
                dentalData[tooth].bop[step.side] = vals.map(Number);
                if (vals.includes('1')) document.getElementById(`${prefix}-${tooth}`).style.color = "red";
            }
            
            toothIndex++;
            if (nextTooth && ((tooth==11 && nextTooth==21) || (tooth==21 && nextTooth==11) || (tooth==31 && nextTooth==41) || (tooth==41 && nextTooth==31))) {
                speak("Through midline");
            }

            if (toothIndex >= step.teeth.length) {
                perioStep++; toothIndex = 0;
                if (pSeq[perioStep]) speak(pSeq[perioStep].msg);
            }
            calculatePerio();
        }
    }

    function manualStatus(id, key) { updateStatus(id, key, !dentalData[id][key]); }
    function manualSurface(id, s) {
        const mats = [null, 'composite', 'gi'];
        let cur = dentalData[id].surfaces[s];
        setSurface(id, s, mats[(mats.indexOf(cur) + 1) % mats.length]);
    }
    function updateStatus(id, key, val) {
        dentalData[id][key] = val;
        if(key === 'missing') document.getElementById(`unit-${id}`).classList.toggle('t-missing', val);
        if(key === 'bridge') document.getElementById(`br-${id}`).style.display = val ? 'block' : 'none';
    }
    function setSurface(id, s, mat) {
        dentalData[id].surfaces[s] = mat;
        document.getElementById(`${id}-${s}`).className.baseVal = "surface" + (mat ? ` c-${mat}` : "");
    }

    function manualPerio() { calculatePerio(); } 

    function calculatePerio() {
        const sxt = { 1:[18,17,16,15,14], 2:[13,12,11,21,22,23], 3:[24,25,26,27,28], 6:[48,47,46,45,44], 5:[43,42,41,31,32,33], 4:[34,35,36,37,38] };
        let bopPos=0, bopTot=0;
        
        for (let s in sxt) {
            let maxPd = 0;
            sxt[s].forEach(id => {
                ['pdb','pdp'].forEach(p => {
                    let val = document.getElementById(`${p}-${id}`).value;
                    for (let c of val) { let n = parseInt(c); if(n > maxPd) maxPd = n; }
                });
                [...dentalData[id].bop.b, ...dentalData[id].bop.p].forEach(v => {
                    if (v !== undefined) { bopTot++; if(v === 1) bopPos++; }
                });
            });
            let code = maxPd === 0 ? "-" : (maxPd <= 3 ? "1/2" : (maxPd <= 5 ? "3" : "4"));
            document.getElementById(`bpe-${s}`).innerText = code;
        }
        document.getElementById('bop-stat').innerText = bopTot === 0 ? "0%" : Math.round((bopPos/bopTot)*100) + "%";
    }
</script>
</body>
</html>
