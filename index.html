<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Charting - Manual Pro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        
        /* Header & Patient Info */
        .header { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .patient-box input { font-size: 18px; padding: 10px; border: 2px solid var(--border); border-radius: 6px; font-weight: bold; width: 250px; }
        
        /* Mode Toggles */
        .mode-toggles { display: flex; gap: 10px; }
        .mode-btn { padding: 12px 30px; font-size: 18px; font-weight: bold; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: var(--primary); color: white; }

        /* Manual Input Bar */
        .manual-input-bar { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; align-items: center; }
        .manual-input-bar input { width: 400px; padding: 10px; font-size: 16px; border-radius: 6px; border: none; font-family: monospace; }
        .manual-input-bar button { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* General Charting */
        .chart-section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(16, 1fr); gap: 5px; margin-bottom: 40px; }
        
        .tooth-card { display: flex; flex-direction: column; align-items: center; position: relative; }
        .tooth-id { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .odontogram { width: 55px; height: 55px; background: white; border: 1px solid var(--border); border-radius: 4px; position: relative; }
        
        /* Interactive Surfaces */
        .surface { fill: #fff; stroke: #94a3b8; stroke-width: 1; cursor: pointer; transition: 0.2s; }
        .surface:hover { fill: #e2e8f0; }
        .c-composite { fill: #3b82f6 !important; }
        .c-gi { fill: #a855f7 !important; }
        
        /* Missing X */
        .missing-overlay { display: none; position: absolute; top: 0; left: 0; width: 55px; height: 55px; pointer-events: none; }
        .t-missing .missing-overlay { display: block; }
        .t-missing .odontogram { opacity: 0.2; }
        
        /* Tooth Controls */
        .tooth-btn { margin-top: 5px; padding: 2px 5px; font-size: 10px; cursor: pointer; background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; border-radius: 3px; }

        /* Perio Table */
        .perio-section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 30px; }
        th, td { border: 1px solid var(--border); padding: 5px; text-align: center; }
        th { background: #f1f5f9; font-size: 16px; }
        input.p-input { width: 40px; text-align: center; border: 1px solid #ccc; border-radius: 3px; padding: 4px; }
        input.p-input:focus { border-color: var(--primary); outline: none; background: #e0f2fe; }

        /* Dashboard */
        .dashboard { display: flex; justify-content: space-around; background: #e0f2fe; padding: 20px; border-radius: 12px; margin-bottom: 50px; }
        .bpe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: #000; border: 2px solid #000; }
        .bpe-grid div { background: white; padding: 15px 30px; font-weight: bold; font-size: 24px; }
    </style>
</head>
<body>

<div class="header">
    <div class="patient-box">
        <label style="font-weight: bold; margin-right: 10px;">Patient ID / Name:</label>
        <input type="text" placeholder="Enter Patient Info...">
    </div>
    <div class="mode-toggles">
        <button class="mode-btn active" id="btn-general" onclick="switchMode('general')">General Charting</button>
        <button class="mode-btn" id="btn-perio" onclick="switchMode('perio')">Periodontal Charting</button>
    </div>
</div>

<div class="manual-input-bar">
    <label style="color: white; font-weight: bold;">Quick Command:</label>
    <input type="text" id="cmd-input" placeholder="e.g., '11 missing' or '14 mo composite'" onkeypress="handleEnter(event)">
    <button onclick="processCommand()">Apply</button>
</div>

<div class="chart-section" id="general-chart">
    <div class="row" id="upper-grid"></div>
    <div class="row" id="lower-grid"></div>
</div>

<div class="perio-section" id="perio-chart">
    <h3>Upper Arch</h3>
    <table id="perio-upper"></table>
    <h3>Lower Arch</h3>
    <table id="perio-lower"></table>
</div>

<div class="dashboard">
    <div>
        <h3>BPE Score</h3>
        <div class="bpe-grid">
            <div id="bpe-s1">-</div><div id="bpe-s2">-</div><div id="bpe-s3">-</div>
            <div id="bpe-s6">-</div><div id="bpe-s5">-</div><div id="bpe-s4">-</div>
        </div>
    </div>
    <div>
        <h3>Bleeding on Probing (BOP)</h3>
        <div style="font-size: 36px; font-weight: bold; color: #dc2626;" id="bop-percent">0%</div>
    </div>
</div>

<script>
    const uIds = ["18","17","16","15","14","13","12","11", "21","22","23","24","25","26","27","28"];
    const lIds = ["48","47","46","45","44","43","42","41", "31","32","33","34","35","36","37","38"];
    const allIds = [...uIds, ...lIds];
    const toothData = {};

    // 初始化資料結構
    allIds.forEach(id => {
        toothData[id] = { missing: false, surfaces: {} };
    });

    window.onload = () => {
        // 渲染 General 圖表
        const renderOdontogram = (ids, target) => {
            const el = document.getElementById(target);
            ids.forEach(id => {
                el.innerHTML += `
                <div class="tooth-card" id="tc-${id}">
                    <div class="tooth-id">${id}</div>
                    <div style="position:relative; width:55px; height:55px;">
                        <svg class="odontogram" viewBox="0 0 100 100">
                            <path id="${id}-B" class="surface" d="M0 0 L100 0 L75 25 L25 25 Z" onclick="toggleSurface('${id}', 'B')" />
                            <path id="${id}-L" class="surface" d="M0 100 L100 100 L75 75 L25 75 Z" onclick="toggleSurface('${id}', 'L')" />
                            <path id="${id}-M" class="surface" d="M0 0 L25 25 L25 75 L0 100 Z" onclick="toggleSurface('${id}', 'M')" />
                            <path id="${id}-D" class="surface" d="M100 0 L75 25 L75 75 L100 100 Z" onclick="toggleSurface('${id}', 'D')" />
                            <rect id="${id}-O" class="surface" x="25" y="25" width="50" height="50" onclick="toggleSurface('${id}', 'O')" />
                        </svg>
                        <svg class="missing-overlay" viewBox="0 0 100 100"><line x1="0" y1="0" x2="100" y2="100" stroke="red" stroke-width="12" /><line x1="100" y1="0" x2="0" y2="100" stroke="red" stroke-width="12" /></svg>
                    </div>
                    <button class="tooth-btn" onclick="toggleMissing('${id}')">Missing</button>
                </div>`;
            });
        };
        renderOdontogram(uIds, 'upper-grid');
        renderOdontogram(lIds, 'lower-grid');

        // 渲染 Perio 表格
        const renderPerioTable = (ids, target) => {
            let html = `<tr><th></th>` + ids.map(id => `<th>${id}</th>`).join('') + `</tr>`;
            html += `<tr><td>Mobility</td>` + ids.map(id => `<td><input class="p-input" type="text" id="mob-${id}"></td>`).join('') + `</tr>`;
            html += `<tr><td>Recession</td>` + ids.map(id => `<td><input class="p-input" type="number" id="rec-${id}"></td>`).join('') + `</tr>`;
            html += `<tr><td>PD (Buc)</td>` + ids.map(id => `<td><input class="p-input pd-input" type="text" id="pdb-${id}" placeholder="e.g. 323" oninput="calculate()"></td>`).join('') + `</tr>`;
            html += `<tr><td>PD (Pal/Lin)</td>` + ids.map(id => `<td><input class="p-input pd-input" type="text" id="pdp-${id}" placeholder="e.g. 323" oninput="calculate()"></td>`).join('') + `</tr>`;
            html += `<tr><td>BOP (1=Y, 0=N)</td>` + ids.map(id => `<td><input class="p-input bop-input" type="text" id="bop-${id}" placeholder="e.g. 101" oninput="calculate()"></td>`).join('') + `</tr>`;
            document.getElementById(target).innerHTML = html;
        };
        renderPerioTable(uIds, 'perio-upper');
        renderPerioTable(lIds, 'perio-lower');
    };

    // --- 模式切換 ---
    function switchMode(mode) {
        document.getElementById('btn-general').classList.remove('active');
        document.getElementById('btn-perio').classList.remove('active');
        document.getElementById('general-chart').style.display = 'none';
        document.getElementById('perio-chart').style.display = 'none';

        if(mode === 'general') {
            document.getElementById('btn-general').classList.add('active');
            document.getElementById('general-chart').style.display = 'block';
        } else {
            document.getElementById('btn-perio').classList.add('active');
            document.getElementById('perio-chart').style.display = 'block';
        }
    }

    // --- 滑鼠點擊控制 (General) ---
    function toggleMissing(id) {
        toothData[id].missing = !toothData[id].missing;
        document.getElementById(`tc-${id}`).classList.toggle('t-missing', toothData[id].missing);
    }

    function toggleSurface(id, surface) {
        const materials = [null, 'composite', 'gi'];
        let current = toothData[id].surfaces[surface];
        let nextIndex = (materials.indexOf(current) + 1) % materials.length;
        let nextMat = materials[nextIndex];
        
        toothData[id].surfaces[surface] = nextMat;
        const p = document.getElementById(`${id}-${surface}`);
        p.className.baseVal = "surface" + (nextMat ? ` c-${nextMat}` : "");
    }

    // --- 快速輸入列邏輯 ---
    function handleEnter(e) { if(e.key === 'Enter') processCommand(); }
    function processCommand() {
        const input = document.getElementById('cmd-input');
        let t = input.value.toLowerCase().trim();
        if(!t) return;

        // "18 to 13 missing"
        const rangeMatch = t.match(/(\d{2})\s*to\s*(\d{2})/);
        let targetIds = [];
        if (rangeMatch) {
            let s = parseInt(rangeMatch[1]), e = parseInt(rangeMatch[2]);
            let min = Math.min(s,e), max = Math.max(s,e);
            targetIds = allIds.filter(id => parseInt(id) >= min && parseInt(id) <= max);
        } else {
            // "11 12 missing"
            const matches = t.match(/\b(1[1-8]|2[1-8]|3[1-8]|4[1-8])\b/g);
            if (matches) targetIds = matches;
        }

        targetIds.forEach(id => {
            if (t.includes("missing")) {
                toothData[id].missing = true;
                document.getElementById(`tc-${id}`).classList.add('t-missing');
            }
            if (t.includes("composite") || t.includes("gi")) {
                let mat = t.includes("composite") ? "composite" : "gi";
                ["b","l","m","d","o"].forEach(s => {
                    if (t.includes(s) || t.includes("mo") && (s==='m'||s==='o') || t.includes("do") && (s==='d'||s==='o')) {
                        toothData[id].surfaces[s.toUpperCase()] = mat;
                        document.getElementById(`${id}-${s.toUpperCase()}`).className.baseVal = `surface c-${mat}`;
                    }
                });
            }
        });
        input.value = ""; // 清空
    }

    // --- Perio 計算邏輯 ---
    function calculate() {
        let bopPositive = 0; let bopTotal = 0;
        
        const sextants = {
            s1: ["18","17","16","15","14"], s2: ["13","12","11","21","22","23"], s3: ["24","25","26","27","28"],
            s6: ["48","47","46","45","44"], s5: ["43","42","41","31","32","33"], s4: ["34","35","36","37","38"]
        };

        for (let s in sextants) {
            let maxPd = 0;
            sextants[s].forEach(id => {
                // PD 計算 BPE
                ['pdb', 'pdp'].forEach(prefix => {
                    let val = document.getElementById(`${prefix}-${id}`).value;
                    for (let char of val) {
                        let num = parseInt(char);
                        if (!isNaN(num) && num > maxPd) maxPd = num;
                    }
                });
                
                // BOP 計算
                let bopVal = document.getElementById(`bop-${id}`).value;
                for (let char of bopVal) {
                    if (char === '1' || char === '0') {
                        bopTotal++;
                        if (char === '1') bopPositive++;
                    }
                }
            });

            // 更新 BPE 顯示
            let code = "-";
            if (maxPd > 0) {
                if (maxPd <= 3) code = "0/1/2"; 
                if (maxPd >= 4 && maxPd <= 5) code = "3";
                if (maxPd >= 6) code = "4";
            }
            document.getElementById(`bpe-${s}`).innerText = code;
        }

        // 更新 BOP 顯示
        const pct = bopTotal === 0 ? 0 : Math.round((bopPositive/bopTotal)*100);
        document.getElementById('bop-percent').innerText = `${pct}%`;
    }
</script>
</body>
</html>
